<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flash Sale Mỹ Phẩm - Xinh Tươi Đón Lễ</title>
  <link rel="stylesheet" href="./src/styles/main.css">
  <link rel="stylesheet" href="./src/styles/customer.css">
</head>
<body>
  <nav class="navbar glass">
    <div class="container nav-content">
      <div class="logo">💄 BeautySale</div>
      <div class="nav-links">
        <a href="/admin.html" class="nav-link">Quản trị</a>
      </div>
    </div>
  </nav>

  <main class="container">
    <section class="hero glass">
      <div class="hero-content">
        <h1>SIÊU SALE LÀM ĐẸP</h1>
        <p>Săn deal mỹ phẩm đỉnh cao với giá siêu hời. Số lượng có hạn!</p>
        
        <div id="countdown-container" class="countdown-wrapper" style="display: none;">
          <h3>🕒 KẾT THÚC SAU</h3>
          <div class="countdown-timer">
            <div class="time-box">
              <span id="hours">00</span><span class="label">Giờ</span>
            </div>
            <div class="time-box">
              <span id="minutes">00</span><span class="label">Phút</span>
            </div>
            <div class="time-box">
              <span id="seconds">00</span><span class="label">Giây</span>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="products-section">
      <h2 class="section-title">⚡ Đang Bán Chạy</h2>
      <div id="category-filter" class="category-filter" style="display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap;">
        <!-- Filled by JS -->
      </div>
      <div id="product-grid" class="product-grid">
        <!-- Products injected by JS -->
      </div>
      <div id="empty-category-msg" style="display:none; text-align:center; padding:40px 20px;">
        <p style="font-size:18px; color:var(--text-secondary);">Rất tiếc, chưa có sản phẩm nào trong danh mục này đang giảm giá</p>
        <h3 style="margin-top:20px; margin-bottom:15px;">🔥 Sản phẩm bán chạy nhất</h3>
        <div id="top-selling-grid" class="product-grid"></div>
      </div>
    </section>

    <section class="products-section" id="combo-section" style="margin-top:40px; display:none;">
      <h2 class="section-title">🎁 Combo Siêu Tiết Kiệm</h2>
      <div id="combo-grid" class="product-grid">
        <!-- Combo cards injected by JS -->
      </div>
    </section>

    <section class="products-section" style="margin-top:40px;">
      <h2 class="section-title">📋 Lịch Sử Đơn Hàng</h2>
      <div id="order-history" class="order-history">
        <!-- Filled by JS -->
      </div>
    </section>
  </main>

  <div id="toast" class="toast"></div>

  <script type="module" src="./src/js/customer.js"></script>
</body>
</html>
